<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #6366f1; }
      .foreground { stroke: white; fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #6366f1; }
      .foreground { stroke: white; fill: white; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <!-- Flow Nodes Logo - Connected nodes forming an "F" shape -->
  <!-- Scaled and centered: original viewBox 0 0 32 32, scaled 4x and offset -->
  <g transform="translate(42, 26) scale(3)">
    <!-- Connection lines -->
    <path
      class="foreground"
      d="M16 14 L16 28 M16 28 L40 28 M16 28 L16 42"
      stroke-width="8"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Nodes -->
    <circle class="foreground" cx="16" cy="14" r="9" />
    <circle class="foreground" cx="16" cy="28" r="9" />
    <circle class="foreground" cx="40" cy="28" r="9" />
    <circle class="foreground" cx="16" cy="42" r="9" />
  </g>
</svg>
